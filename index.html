<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a1a12" />
  <title>Farmapp</title>
  <style>
    :root{
      --bg:#07150f;
      --card:#0f241a;
      --text:#e9fff5;
      --muted:#9fc7b6;
      --line:#1f3f30;

      --accent:#18c46c;
      --accent2:#0ea85a;
      --danger:#ff5c5c;

      --radius:18px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{
      margin:0;
      background:radial-gradient(1200px 800px at 30% 0%, #0b2519 0%, var(--bg) 45%, #040c08 100%);
      color:var(--text)
    }
    a{color:inherit}
    .wrap{max-width:980px;margin:0 auto;padding:16px;padding-bottom:92px}
    .row{display:flex;align-items:center;gap:12px}
    .space{height:12px}
    .h1{font-size:20px;font-weight:950;margin:0;letter-spacing:.2px}
    .h2{font-size:14px;font-weight:950;margin:0 0 8px}
    .muted{color:var(--muted);font-size:13px}
    .small{font-size:12px}

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.06)), var(--card);
      border:1px solid rgba(255,255,255,.06);
      border-radius:var(--radius);
      padding:12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }
    .card.flat{box-shadow:none}
    .cardHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}

    .btn{
      display:block;border:1px solid rgba(255,255,255,.08);
      border-radius:14px;padding:12px;background:rgba(10,26,18,.55);
      font-weight:900;text-align:center;text-decoration:none;
    }
    .btn:hover{filter:brightness(1.04)}
    .btn.primary{background:linear-gradient(180deg, var(--accent), var(--accent2));border-color:rgba(0,0,0,.0);color:#052312}
    .btn.ghost{background:transparent}
    .btn.danger{border-color:rgba(255,92,92,.55);color:var(--danger);background:transparent}
    .btn.small{padding:10px 10px;font-size:13px;border-radius:12px}

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    @media (max-width:720px){ .grid3{grid-template-columns:1fr 1fr;} }

    .pill{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;padding:6px 10px;
      font-size:12px;font-weight:950;color:var(--muted);
      background:rgba(0,0,0,.18);
    }
    .pill.ok{color:#bff7dc;border-color:rgba(24,196,108,.35)}
    .pill.warn{color:#ffe9b8;border-color:rgba(255,213,128,.25)}

    .input, select, textarea{
      width:100%;padding:12px;border:1px solid rgba(255,255,255,.10);
      border-radius:14px;background:rgba(0,0,0,.22);
      color:var(--text);font-size:15px;outline:none;
    }
    textarea{min-height:120px}

    .nav{
      position:fixed;left:0;right:0;bottom:0;
      border-top:1px solid rgba(255,255,255,.08);
      background:rgba(7,21,15,.78);
      backdrop-filter: blur(10px);
    }
    .nav .inner{max-width:980px;margin:0 auto;display:flex}
    .nav a{flex:1;padding:12px 8px;text-align:center;text-decoration:none;color:rgba(159,199,182,.9);font-weight:950;font-size:12px}
    .nav a.active{color:var(--text)}
    .nav a .dot{display:block;width:6px;height:6px;border-radius:999px;margin:6px auto 0;background:transparent}
    .nav a.active .dot{background:var(--accent)}

    .list{display:flex;flex-direction:column;gap:10px}
    .item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
    .item:last-child{border-bottom:none}
    .badge{
      display:inline-block;border:1px solid rgba(255,255,255,.10);
      border-radius:999px;padding:6px 10px;font-size:12px;text-decoration:none;font-weight:950;color:var(--muted);
      background:rgba(0,0,0,.18);
    }
    .right{margin-left:auto}

    .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.60)}
    .sheet{
      position:fixed;left:0;right:0;bottom:0;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.06)), #091a12;
      border-radius:18px 18px 0 0;padding:14px;border-top:1px solid rgba(255,255,255,.10);
      max-width:980px;margin:0 auto;
      box-shadow: 0 -20px 50px rgba(0,0,0,.55);
      max-height:80vh; overflow:auto;
    }
    hr{border:none;border-top:1px solid rgba(255,255,255,.10);margin:12px 0}

    #errorOverlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;z-index:9999}
    #errorOverlay .box{max-width:980px;margin:16px auto;padding:16px}
    #errorOverlay pre{white-space:pre-wrap;word-break:break-word;background:#000;border:1px solid #333;border-radius:12px;padding:12px;color:#fff}
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="errorOverlay">
    <div class="box">
      <div class="card">
        <div class="row" style="justify-content:space-between;">
          <div>
            <div class="h1">Noe gikk galt</div>
            <div class="muted">Appen skal aldri bli “blank”. Kopiér feilen under og send den hit.</div>
          </div>
          <a class="btn danger small" href="javascript:void(0)" id="errClose">Lukk</a>
        </div>
        <div class="space"></div>
        <pre id="errText"></pre>
        <div class="space"></div>
        <div class="grid2">
          <a class="btn" href="#/backup">Gå til Backup</a>
          <a class="btn" href="#/forside">Til Forside</a>
        </div>
      </div>
    </div>
  </div>

<script>
/* =======================
   Farmapp (One-file) v0.8.0
   - Skifter under Innstillinger → Min gård
   - Arkivfaner for Maskiner og Skifter
   - Rediger/slett innkjøp (SLETT-bekreftelse)
   - Rediger/slett service (SLETT-bekreftelse)
   ======================= */

const APP_VERSION = "0.8.0";
const KEY = "farmapp_state_v2";
const nowISO = ()=> new Date().toISOString();
const uid = ()=> Math.random().toString(36).slice(2) + Date.now().toString(36);

/* ---------- Date/Time (dd.mm.åååå + 24t) ---------- */
const nbDate = new Intl.DateTimeFormat("nb-NO", { day:"2-digit", month:"2-digit", year:"numeric" });
const nbDT = new Intl.DateTimeFormat("nb-NO", {
  day:"2-digit", month:"2-digit", year:"numeric",
  hour:"2-digit", minute:"2-digit", second:"2-digit",
  hour12:false
});
function fmtDate(iso){ try{ return nbDate.format(new Date(iso)); }catch{ return ""; } }
function fmtDateTime(iso){ try{ return nbDT.format(new Date(iso)); }catch{ return ""; } }
function toISOFromDateInput(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr + "T09:00:00");
  return isNaN(d.getTime()) ? null : d.toISOString();
}
function toDatetimeLocalValue(iso){
  try{
    const d = new Date(iso);
    const pad=(n)=>String(n).padStart(2,"0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }catch{ return ""; }
}
function toISOFromDatetimeLocal(dtLocal){
  if(!dtLocal) return null;
  const d = new Date(dtLocal);
  return isNaN(d.getTime()) ? null : d.toISOString();
}

/* ---------- DOM helpers ---------- */
function h(html){ const t=document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstElementChild; }
const $ = (sel, root=document)=> root.querySelector(sel);
function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

/* ---------- Export helpers ---------- */
function toCSV(rows){
  const keys = Array.from(new Set(rows.flatMap(r=>Object.keys(r||{}))));
  const esc = (v)=> {
    const s = String(v ?? "");
    if(/[",\n\r;]/.test(s)) return '"' + s.replaceAll('"','""') + '"';
    return s;
  };
  const header = keys.join(";");
  const lines = rows.map(r=> keys.map(k=>esc(r?.[k])).join(";"));
  return [header, ...lines].join("\n");
}
function downloadText(filename, text, mime="text/plain"){
  const blob = new Blob([text], {type:mime});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=> URL.revokeObjectURL(a.href), 500);
}
function safeFilename(name){
  return (name||"export").toLowerCase().replace(/[^a-z0-9\-_]+/gi,"-").replace(/-+/g,"-").slice(0,60);
}
function confirmTypeDelete(what){
  const txt = prompt(`For å slette ${what}, skriv SLETT (store bokstavar):`);
  return txt === "SLETT";
}

/* ---------- State ---------- */
const defaultState = {
  meta: { version: 1, createdAt: nowISO(), updatedAt: nowISO() },
  farm: { name: "Min gård", kommune: "Karmøy", ksl: false },

  activities: [],
  tasks: [],
  work: { running: null, sessions: [] },

  assets: [],     // {id,name,kind,brandModel,serial,notes,createdAtISO,archivedAtISO?}
  purchases: [],  // {id,dateISO,supplier,category,amountNok,notes,receiptUrl,assetId,createdAtISO}
  services: [],   // {id,assetId,dateISO,category,costNok,notes,createdAtISO}

  fields: [],       // {id,name,areaDaa,type,notes,createdAtISO,archivedAtISO?}
  sprayJournal: [], // {id,dateISO,fieldId,purpose,product,dose,water,operator,weather,notes,createdAtISO}

  settings: {
    weather: { place: "Karmøy" },
    shortcuts: [{ id:"yr", title:"Vær (yr.no)", url:"https://www.yr.no" }],
    backgroundUrl: ""
  }
};

function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }
function migrateState(s){
  if(!s.meta) s.meta = deepClone(defaultState.meta);
  if(!s.farm) s.farm = deepClone(defaultState.farm);
  if(!Array.isArray(s.activities)) s.activities = [];
  if(!Array.isArray(s.tasks)) s.tasks = [];
  if(!s.work) s.work = deepClone(defaultState.work);
  if(!Array.isArray(s.work.sessions)) s.work.sessions = [];
  if(!Array.isArray(s.assets)) s.assets = [];
  if(!Array.isArray(s.purchases)) s.purchases = [];
  if(!Array.isArray(s.services)) s.services = [];
  if(!Array.isArray(s.fields)) s.fields = [];
  if(!Array.isArray(s.sprayJournal)) s.sprayJournal = [];
  if(!s.settings) s.settings = deepClone(defaultState.settings);
  if(!s.settings.weather) s.settings.weather = deepClone(defaultState.settings.weather);
  if(!Array.isArray(s.settings.shortcuts)) s.settings.shortcuts = deepClone(defaultState.settings.shortcuts);
  if(typeof s.settings.backgroundUrl !== "string") s.settings.backgroundUrl = "";
  return s;
}
function loadState(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return deepClone(defaultState);
    const parsed = JSON.parse(raw);
    const merged = { ...deepClone(defaultState), ...parsed };
    return migrateState(merged);
  }catch{
    return deepClone(defaultState);
  }
}
function saveState(state){
  state.meta = state.meta || {};
  state.meta.updatedAt = nowISO();
  localStorage.setItem(KEY, JSON.stringify(state));
}
function exportJSON(){ return JSON.stringify(loadState(), null, 2); }
function importJSON(txt){
  const parsed = JSON.parse(txt);
  if(!parsed || !parsed.meta) throw new Error("Ugyldig backup (mangler meta)");
  saveState(migrateState(parsed));
}

/* ---------- Activity ---------- */
function addActivity(state, { type, title, description="", refs={} }){
  const a = { id: uid(), type, title: title || type, description, createdAt: nowISO(), refs, deletedAt: null };
  state.activities.unshift(a);
  if(state.activities.length > 12000) state.activities.length = 12000;
  return a;
}

/* ---------- Models ---------- */
function newTask({title, description, dueDateISO}){
  return { id: uid(), title, description, dueDateISO, completedAtISO: null, createdAtISO: nowISO() };
}
function newWorkSession({startedAtISO, endedAtISO, customer, jobType, notes=""}){
  return { id: uid(), startedAtISO, endedAtISO, customer, jobType, notes, editedAtISO: null };
}
function newAsset({name, kind, brandModel="", serial="", notes=""}){
  return { id: uid(), name, kind, brandModel, serial, notes, createdAtISO: nowISO(), archivedAtISO: null };
}
function newPurchase({dateISO, supplier, category, amountNok, notes="", receiptUrl="", assetId=null}){
  return { id: uid(), dateISO, supplier, category, amountNok: Number(amountNok)||0, notes, receiptUrl, assetId, createdAtISO: nowISO() };
}
function newService({assetId, dateISO, category, costNok, notes=""}){
  return { id: uid(), assetId, dateISO, category, costNok: Number(costNok)||0, notes, createdAtISO: nowISO() };
}
function newField({name, areaDaa, type, notes=""}){
  return { id: uid(), name, areaDaa: Number(areaDaa)||0, type, notes, createdAtISO: nowISO(), archivedAtISO: null };
}
function newSpray({dateISO, fieldId, purpose, product, dose, water, operator, weather, notes}){
  return {
    id: uid(),
    dateISO, fieldId,
    purpose: purpose || "",
    product: product || "",
    dose: dose || "",
    water: water || "",
    operator: operator || "",
    weather: weather || "",
    notes: notes || "",
    createdAtISO: nowISO()
  };
}

/* ---------- Router ---------- */
function route(){
  const hash = (location.hash || "#/forside").slice(1);
  const [path, query] = hash.split("?");
  const params = new URLSearchParams(query || "");
  return { path, params };
}
function nav(path){ location.hash = `#${path}`; }

/* ---------- Error overlay ---------- */
function showError(err){
  const overlay = $("#errorOverlay");
  const pre = $("#errText");
  const msg = (err && err.stack) ? err.stack : String(err);
  if(pre) pre.textContent = msg;
  if(overlay) overlay.style.display = "block";
}
function hideError(){ const overlay = $("#errorOverlay"); if(overlay) overlay.style.display = "none"; }
window.addEventListener("error", (e)=> showError(e.error || e.message));
window.addEventListener("unhandledrejection", (e)=> showError(e.reason || e));
document.addEventListener("click", (e)=> { if(e.target && e.target.id==="errClose") hideError(); });

/* ---------- Background optional ---------- */
function applyBackground(){
  const s = loadState();
  const url = (s.settings?.backgroundUrl || "").trim();
  if(url){
    document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.70)), url('${url.replaceAll("'","%27")}')`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundPosition = "center";
    document.body.style.backgroundAttachment = "fixed";
  }else{
    document.body.style.backgroundImage = "";
  }
}

/* ---------- Shell ---------- */
function bottomNav(active){
  const is = (p)=> active===p ? "active" : "";
  return h(`
    <div class="nav">
      <div class="inner">
        <a class="${is("/forside")}" href="#/forside">Forside<div class="dot"></div></a>
        <a class="${is("/oppgaver")}" href="#/oppgaver">Oppgaver<div class="dot"></div></a>
        <a class="${is("/jobb")}" href="#/jobb">Jobb<div class="dot"></div></a>
        <a class="${is("/mer")}" href="#/mer">Mer<div class="dot"></div></a>
        <a class="${is("/innstillinger")}" href="#/innstillinger">Innst.<div class="dot"></div></a>
      </div>
    </div>
  `);
}
function renderShell(out, activePath){
  const node = h(`<div></div>`);
  node.innerHTML = `
    <div class="wrap">
      <div class="row" style="justify-content:space-between;">
        <div>
          <div class="h1">${escapeHtml(out.title || "")}</div>
          <div class="muted">${escapeHtml(out.subtitle || "")}</div>
        </div>
        <span class="pill">v${escapeHtml(APP_VERSION)}</span>
      </div>
      <div class="space"></div>
    </div>
  `;
  const wrap = node.querySelector(".wrap");
  wrap.appendChild(out.node);
  node.appendChild(bottomNav(activePath));
  return node;
}

/* ---------- Common stats ---------- */
function sumFields(state){
  const active = state.fields.filter(f=>!f.archivedAtISO);
  const archived = state.fields.filter(f=>!!f.archivedAtISO);
  const by = (arr,t)=> arr.filter(f=>f.type===t).reduce((s,f)=>s+(Number(f.areaDaa)||0),0);
  const total = (arr)=> arr.reduce((s,f)=>s+(Number(f.areaDaa)||0),0);

  return {
    activeCount: active.length,
    archivedCount: archived.length,
    activeTotalDaa: total(active),
    archivedTotalDaa: total(archived),
    fulldyrket: by(active,"FUL"),
    overflatedyrket: by(active,"OVF"),
    innmarksbeite: by(active,"IB")
  };
}
function fieldTypeLabel(t){
  if(t==="FUL") return "Fulldyrket";
  if(t==="OVF") return "Overflatedyrket";
  if(t==="IB") return "Innmarksbeite";
  return t || "";
}
function buildYrUrl(place){
  const q = encodeURIComponent((place || "Karmøy").trim());
  return `https://www.yr.no/nb/sok?q=${q}`;
}
function statCard(label, value, hint="", pillClass=""){
  return `
    <div class="card flat" style="background:rgba(0,0,0,.14);border:1px solid rgba(255,255,255,.08);box-shadow:none">
      <div class="muted">${escapeHtml(label)}</div>
      <div class="row" style="justify-content:space-between;align-items:flex-end">
        <div style="font-size:22px;font-weight:980;line-height:1.1">${escapeHtml(value)}</div>
        ${hint ? `<span class="pill ${pillClass}">${escapeHtml(hint)}</span>` : ``}
      </div>
    </div>
  `;
}

/* =======================
   Pages
   ======================= */

function pageForside(state){
  const running = state.work.running;
  const activities = state.activities.filter(a=>!a.deletedAt).slice(0, 10);

  const openTasks = state.tasks.filter(t=>!t.completedAtISO).length;
  const assetsCount = state.assets.filter(a=>!a.archivedAtISO).length;

  const fsum = sumFields(state);

  const shortcuts = (state.settings.shortcuts || []).map(sc=>{
    if(sc.id === "yr"){
      return { ...sc, url: buildYrUrl(state.settings.weather?.place || "Karmøy") };
    }
    return sc;
  });

  const node = h(`
    <div>
      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="h2">Oversikt</div>
            <div class="muted">Ryddig og raskt</div>
          </div>
          ${running ? `<span class="pill ok">Jobb pågår</span>` : `<span class="pill">Ingen jobb nå</span>`}
        </div>
        <div class="space"></div>

        <div class="grid3">
          ${statCard("Åpne oppgaver", String(openTasks), openTasks ? "Sjekk i dag" : "OK", openTasks ? "warn" : "ok")}
          ${statCard("Skifter", String(fsum.activeCount), fsum.activeCount ? "Registrert" : "Legg til", fsum.activeCount ? "ok" : "")}
          ${statCard("Areal (daa)", String(Math.round(fsum.activeTotalDaa*10)/10), "Sum aktive", fsum.activeTotalDaa>0 ? "ok" : "")}
        </div>

        <div class="space"></div>
        <div class="grid3">
          ${statCard("Maskiner/utstyr", String(assetsCount), assetsCount ? "OK" : "Registrer", assetsCount ? "ok" : "")}
          ${statCard("Sprøyting", String(state.sprayJournal.length), "Journal", state.sprayJournal.length ? "ok" : "")}
          ${statCard("Værsted", String(state.settings.weather?.place || "—"), "yr.no", "ok")}
        </div>

        <div class="space"></div>
        <div class="grid2">
          <a class="btn primary" href="#/oppgaver?new=1">+ Ny oppgave</a>
          <a class="btn primary" href="#/spray?new=1">+ Sprøyting</a>
        </div>

        <div class="space"></div>
        <div class="grid2">
          <a class="btn" href="#/maskiner">Maskiner</a>
          <a class="btn" href="#/innstillinger?tab=mingard">Min gård</a>
        </div>
      </div>

      <div class="space"></div>

      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="h2">Snarveier</div>
            <div class="muted">Egne lenker + yr.no-sted</div>
          </div>
          <a class="badge" href="#/innstillinger?tab=lenker">Rediger</a>
        </div>
        <div class="space"></div>
        ${shortcuts.length ? `
          <div class="grid2">
            ${shortcuts.map(s=>`
              <a class="btn" target="_blank" rel="noopener" href="${escapeHtml(s.url)}">${escapeHtml(s.title)}</a>
            `).join("")}
          </div>
        ` : `<div class="muted">Ingen snarveier enda.</div>`}
      </div>

      <div class="space"></div>

      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="h2">Siste aktiviteter</div>
            <div class="muted">Trykk for detaljer</div>
          </div>
          <a class="badge" href="#/aktivitetlogg">Logg</a>
        </div>

        <div class="space"></div>
        ${activities.length ? `
          <div class="list">
            ${activities.map(a=>`
              <a class="item" style="text-decoration:none" href="#/aktivitet?id=${a.id}">
                <div class="row" style="justify-content:space-between;">
                  <div>
                    <div><b>${escapeHtml(a.title)}</b></div>
                    <div class="muted">${escapeHtml(a.type)} • ${fmtDateTime(a.createdAt)}</div>
                  </div>
                  <span class="badge">Åpne</span>
                </div>
              </a>
            `).join("")}
          </div>
        ` : `<div class="muted">Ingen aktiviteter enda.</div>`}
      </div>
    </div>
  `);

  return { title:"Forside", subtitle:`${state.farm.name} • Norsk • GitHub-only`, node };
}

/* ----- Aktivitet ----- */
function pageAktivitet(state, params){
  const id = params.get("id");
  const a = state.activities.find(x=>x.id===id && !x.deletedAt);
  const node = h(`
    <div>
      <div class="card">
        ${a ? `
          <div class="h2">${escapeHtml(a.title)}</div>
          <div class="muted">${escapeHtml(a.type)} • ${fmtDateTime(a.createdAt)}</div>
          <div class="space"></div>
          ${a.description ? `<div>${escapeHtml(a.description)}</div>` : `<div class="muted">Ingen detaljer.</div>`}
          <div class="space"></div>
          <div class="muted small">Ref: ${escapeHtml(JSON.stringify(a.refs || {}))}</div>
        ` : `<div class="muted">Fant ikke aktiviteten (kan være slettet).</div>`}

        <div class="h2">${view==="ferdige" ? "Ferdige" : "Åpne"} oppgaver</div>
        ${list.length ? `
          <div class="list">
            ${list.map(t=>`
              <div class="item">
                <div class="row" style="justify-content:space-between;">
                  <div>
                    <div><b>${escapeHtml(t.title)}</b></div>
                    <div class="muted">${t.dueDateISO ? fmtDate(t.dueDateISO) : ""}${t.completedAtISO ? " • fullført" : ""}</div>
                  </div>
                  <div class="row">
                    ${t.completedAtISO ? `
                      <a class="badge" href="javascript:void(0)" data-act="reopen" data-id="${t.id}">Åpne igjen</a>
                    ` : `
                      <a class="badge" href="javascript:void(0)" data-act="done" data-id="${t.id}">Fullfør</a>
                    `}
                  </div>
                </div>
                ${t.description ? `<div class="muted" style="margin-top:6px">${escapeHtml(t.description)}</div>`:""}
              </div>
            `).join("")}
          </div>
        ` : `<div class="muted">Ingen oppgaver her.</div>`}
        <div class="muted" style="margin-top:10px">Oppgaver slettes ikke lett. Fullfør → “Ferdige” (søkbar).</div>

  `);

  setTimeout(()=>{
    $("#q", node)?.addEventListener("input", (e)=>{
      const v = e.target.value;
      const p = new URLSearchParams(params);
      if(v) p.set("q", v); else p.delete("q");
      location.hash = `#/oppgaver?${p.toString()}`;
    });

    node.querySelectorAll("[data-act]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const act = el.getAttribute("data-act");
        const id = el.getAttribute("data-id");
        const s = loadState();
        const t = s.tasks.find(x=>x.id===id);
        if(!t) return;
        if(act==="done"){
          t.completedAtISO = nowISO();
          addActivity(s, { type:"TODO_FERDIG", title:`Oppgave ferdig: ${t.title}`, refs:{ taskId: t.id }});
        }else if(act==="reopen"){
          t.completedAtISO = null;
          addActivity(s, { type:"TODO_GJENÅPNET", title:`Oppgave åpnet igjen: ${t.title}`, refs:{ taskId: t.id }});
        }
        saveState(s);
        location.hash = `#/oppgaver?view=${view}`;

    });

    if(creating){

      $("#t_save")?.addEventListener("click", ()=>{
        const title = $("#t_title")?.value?.trim();
        const dateStr = $("#t_date")?.value;
        const desc = $("#t_desc")?.value?.trim() || "";
        if(!title){ alert("Fyll ut tittel"); return; }
        const dueISO = toISOFromDateInput(dateStr) || null;
        const s = loadState();
        const task = newTask({title, description: desc, dueDateISO: dueISO});
        s.tasks.push(task);
        addActivity(s, { type:"TODO_NY", title:`Ny oppgave: ${task.title}`, description: desc, refs:{ taskId: task.id }});
        saveState(s);
        nav("/oppgaver");
      });
    }
  }, 0);

  return { title:"Oppgaver", subtitle:"Åpne / Ferdige (søkbare)", node };
}

let tickTimer = null;
function calcElapsed(startISO){
  const start = new Date(startISO).getTime();
  const ms = Math.max(0, Date.now() - start);
  const s = Math.floor(ms/1000);
  const hh = Math.floor(s/3600);
  const mm = Math.floor((s%3600)/60);
  const ss = s%60;
  const pad=(n)=>String(n).padStart(2,"0");
  return `${pad(hh)}:${pad(mm)}:${pad(ss)}`;
}
function workEditSheet(session){
  return `
    <div class="sheet-backdrop" id="bd"></div>
    <div class="sheet">
      <div class="h2">Rediger økt</div>
      <label class="muted">Start</label><div class="space"></div>
      <input class="input" id="ws_start" type="datetime-local" value="${escapeHtml(toDatetimeLocalValue(session.startedAtISO))}" />
      <div class="space"></div>
      <label class="muted">Stopp</label><div class="space"></div>
      <input class="input" id="ws_end" type="datetime-local" value="${escapeHtml(toDatetimeLocalValue(session.endedAtISO))}" />
      <div class="space"></div>
      <label class="muted">Notat</label><div class="space"></div>
      <textarea class="input" id="ws_notes">${escapeHtml(session.notes||"")}</textarea>
      <div class="space"></div>
      <div class="grid2">
        <a class="btn primary" href="javascript:void(0)" id="ws_save">Lagre</a>
        <a class="btn" href="#/jobb">Avbryt</a>
      </div>
    </div>
  `;
}
function pageJobb(state, params){
  const running = state.work.running;
  const editingId = params.get("edit");

  const sessions = state.work.sessions
    .slice()
    .sort((a,b)=> (b.startedAtISO || "").localeCompare(a.startedAtISO || ""))
    .slice(0, 30);

  const currentEdit = editingId ? (state.work.sessions.find(x=>x.id===editingId) || null) : null;

  const node = h(`
    <div>
      <div class="card">
        <div class="h2">Jobbklokke</div>
        <div class="muted">Teller sekunder live. Du kan redigere tider i ettertid.</div>
        <div class="space"></div>

        ${running ? `
          <div class="row" style="justify-content:space-between;">
            <div>
              <div><b>${escapeHtml(running.customer)}</b> – ${escapeHtml(running.jobType)}</div>
              <div class="muted">Startet: ${fmtDateTime(running.startedAtISO)}</div>
            </div>
            <span class="pill ok" id="elapsed">00:00:00</span>
          </div>
          <div class="space"></div>
          <a class="btn danger" href="javascript:void(0)" id="stop">Stopp</a>
        ` : `
          <label class="muted">Kunde</label><div class="space"></div>
          <input class="input" id="c" placeholder="f.eks Ola Hansen" />
          <div class="space"></div>
          <label class="muted">Jobbtype</label><div class="space"></div>
          <input class="input" id="t" placeholder="f.eks Slått" />
          <div class="space"></div>
          <a class="btn primary" href="javascript:void(0)" id="start">Start</a>
        `}
      </div>

      <div class="space"></div>

      <div class="card">
        <div class="h2">Siste økter</div>
        ${sessions.length ? `
          <div class="list">
            ${sessions.map(s=>`
              <div class="item">
                <div class="row" style="justify-content:space-between;">
                  <div>
                    <div><b>${escapeHtml(s.customer)}</b> – ${escapeHtml(s.jobType)}</div>
                    <div class="muted">${fmtDateTime(s.startedAtISO)} → ${fmtDateTime(s.endedAtISO)}</div>
                  </div>
                  <a class="badge" href="#/jobb?edit=${s.id}">Rediger</a>
                </div>
                ${s.notes ? `<div class="muted" style="margin-top:6px">${escapeHtml(s.notes)}</div>`:""}
              </div>
            `).join("")}
          </div>
        ` : `<div class="muted">Ingen økter enda.</div>`}
      </div>

      ${currentEdit ? workEditSheet(currentEdit) : ""}
    </div>
  `);

  setTimeout(()=>{
    if(tickTimer){ clearInterval(tickTimer); tickTimer = null; }

    if(running){
      const el = $("#elapsed");
      const update = ()=> { if(el) el.textContent = calcElapsed(running.startedAtISO); };
      update();
      tickTimer = setInterval(update, 1000);

      $("#stop")?.addEventListener("click", ()=>{
        const s = loadState();
        const r = s.work.running;
        if(!r) return;
        const endISO = nowISO();
        const session = newWorkSession({ startedAtISO: r.startedAtISO, endedAtISO: endISO, customer: r.customer, jobType: r.jobType });
        s.work.sessions.push(session);
        s.work.running = null;
        addActivity(s, {
          type:"JOBB_STOPP",
          title:`Jobb ferdig: ${session.customer} – ${session.jobType}`,
          description:`${fmtDateTime(session.startedAtISO)} → ${fmtDateTime(session.endedAtISO)}`,
          refs:{ workId: session.id }
        });
        saveState(s);
        nav("/forside");
      });
    }else{
      $("#start")?.addEventListener("click", ()=>{
        const customer = $("#c")?.value?.trim();
        const jobType = $("#t")?.value?.trim();
        if(!customer || !jobType){ alert("Fyll ut kunde og jobbtype"); return; }
        const s = loadState();
        s.work.running = { id: uid(), startedAtISO: nowISO(), customer, jobType };
        addActivity(s, { type:"JOBB_START", title:`Jobb startet: ${customer} – ${jobType}`, refs:{ running:true }});
        saveState(s);
        render();
      });
    }

    if(currentEdit){
      $("#bd")?.addEventListener("click", ()=> nav("/jobb"));
      $("#ws_save")?.addEventListener("click", ()=>{
        const s = loadState();
        const sess = s.work.sessions.find(x=>x.id===currentEdit.id);
        if(!sess){ alert("Fant ikke økt"); return; }
        const startISO = toISOFromDatetimeLocal($("#ws_start")?.value);
        const endISO = toISOFromDatetimeLocal($("#ws_end")?.value);
        if(!startISO || !endISO){ alert("Fyll ut start og stopp"); return; }
        if(new Date(endISO).getTime() <= new Date(startISO).getTime()){ alert("Stopp må være etter start"); return; }
        sess.startedAtISO = startISO;
        sess.endedAtISO = endISO;
        sess.notes = $("#ws_notes")?.value?.trim() || "";
        sess.editedAtISO = nowISO();
        addActivity(s, { type:"JOBB_REDIGERT", title:`Jobb redigert: ${sess.customer} – ${sess.jobType}`, refs:{ workId: sess.id }});
        saveState(s);
        nav("/jobb");
      });
    }
  }, 0);

  return { title:"Jobb", subtitle:"Live timer + redigering", node };
}

function exportSprayCSV(state, rows, filename){
  const byField = (id)=> state.fields.find(f=>f.id===id)?.name || "";
  const out = rows.map(s=>({
    dato: s.dateISO,
    skifte: byField(s.fieldId),
    formal: s.purpose,
    produkt: s.product,
    dose: s.dose,
    vann: s.water,
    utfort_av: s.operator,
    vaer: s.weather,
    notat: s.notes
  }));
  downloadText(filename, toCSV(out), "text/csv");
}
function pageSpray(state, params){
  const creating = params.get("new")==="1";
  const id = params.get("id");
  const q = (params.get("q")||"").trim().toLowerCase();
  const filterField = params.get("field");

  const list = state.sprayJournal
    .filter(s=> filterField ? s.fieldId===filterField : true)
    .filter(s=> !q ? true : (`${s.purpose} ${s.product} ${s.dose} ${s.operator} ${s.notes||""}`).toLowerCase().includes(q))

              const f = state.fields.find(x=>x.id===s.fieldId);

                <a class="item" style="text-decoration:none" href="#/spray?id=${s.id}">

              `;
            }).join("")}
          </div>
        ` : `<div class="muted">Ingen registreringer enda.</div>`}
      </div>

      ${current ? `
        <div class="space"></div>
        <div class="card">
          <div class="cardHeader">
            <div>
              <div class="h2">${escapeHtml(current.purpose || "Sprøyting")} – ${escapeHtml(current.product || "")}</div>
              <div class="muted">${current.dateISO ? fmtDateTime(current.dateISO) : ""} • Skifte: ${escapeHtml(fieldName)}</div>
            </div>
            <a class="badge" href="#/spray${filterField ? `?field=${filterField}`:""}">Lukk</a>
          </div>

          <div class="space"></div>
          <div class="grid2">
            <div class="card flat" style="background:rgba(0,0,0,.14);border:1px solid rgba(255,255,255,.08);box-shadow:none">
              <div class="muted">Dose</div>
              <div style="font-size:16px;font-weight:980">${escapeHtml(current.dose || "—")}</div>
            </div>
            <div class="card flat" style="background:rgba(0,0,0,.14);border:1px solid rgba(255,255,255,.08);box-shadow:none">
              <div class="muted">Vann</div>
              <div style="font-size:16px;font-weight:980">${escapeHtml(current.water || "—")}</div>
            </div>
          </div>

          <div class="space"></div>
          <div class="muted">Utført av: <b>${escapeHtml(current.operator || "—")}</b></div>
          ${current.weather ? `<div class="muted">Vær: ${escapeHtml(current.weather)}</div>` : ``}
          ${current.notes ? `<div class="muted" style="margin-top:8px">${escapeHtml(current.notes)}</div>` : ``}
        </div>
      ` : ""}

      ${creating ? sprayWizardSheet(state, params.get("field") || "") : ""}
    </div>
  `);

  setTimeout(()=>{
    $("#q", node)?.addEventListener("input", (e)=>{
      const v = e.target.value;
      const p = new URLSearchParams(params);
      if(v) p.set("q", v); else p.delete("q");
      location.hash = `#/spray?${p.toString()}`;
    });

    $("#exCsv")?.addEventListener("click", ()=>{
      const s = loadState();
      const rows = s.sprayJournal
        .filter(x=> filterField ? x.fieldId===filterField : true)
        .slice().sort((a,b)=> (a.dateISO||"").localeCompare(b.dateISO||""));
      const name = filterField ? (s.fields.find(f=>f.id===filterField)?.name || "skifte") : "alle";
      exportSprayCSV(s, rows, `sprøytejournal-${safeFilename(name)}.csv`);
    });

    $("#exJson")?.addEventListener("click", ()=>{
      const s = loadState();
      const rows = s.sprayJournal.filter(x=> filterField ? x.fieldId===filterField : true);
      const name = filterField ? (s.fields.find(f=>f.id===filterField)?.name || "skifte") : "alle";
      downloadText(`sprøytejournal-${safeFilename(name)}.json`, JSON.stringify(rows, null, 2), "application/json");
    });

    if(creating){
      $("#bd")?.addEventListener("click", ()=> nav(`/spray${filterField ? `?field=${filterField}`:""}`));

      const d = new Date();
      const pad = (n)=> String(n).padStart(2,"0");
      const dt = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
      $("#sp_date") && ($("#sp_date").value = dt);

      $("#sp_save")?.addEventListener("click", ()=>{
        const s = loadState();
        const dateISO = toISOFromDatetimeLocal($("#sp_date")?.value) || nowISO();
        const fieldId = $("#sp_field")?.value;
        const purpose = $("#sp_purpose")?.value || "";
        const product = $("#sp_product")?.value?.trim() || "";
        const dose = $("#sp_dose")?.value?.trim() || "";
        const water = $("#sp_water")?.value?.trim() || "";
        const operator = $("#sp_operator")?.value?.trim() || "";
        const weather = $("#sp_weather")?.value?.trim() || "";
        const notes = $("#sp_notes")?.value?.trim() || "";

        if(!fieldId){ alert("Du må velge skifte"); return; }
        if(!product){ alert("Fyll ut produkt"); return; }
        if(!dose){ alert("Fyll ut dose"); return; }

        const f = s.fields.find(x=>x.id===fieldId);
        if(!f || f.archivedAtISO){ alert("Skiftet finnes ikke eller er arkivert"); return; }

        const entry = newSpray({dateISO, fieldId, purpose, product, dose, water, operator, weather, notes});
        s.sprayJournal.push(entry);

        addActivity(s, {
          type:"SPRØYTING",
          title:`Sprøyting: ${f.name} – ${purpose}`,
          description:`${fmtDateTime(dateISO)} • ${product} • Dose: ${dose}${water ? ` • Vann: ${water}`:""}`,
          refs:{ fieldId, sprayId: entry.id }
        });

        saveState(s);
        nav(`/spray?field=${fieldId}`);
      });
    }
  },0);

  return { title:"Sprøytejournal", subtitle:"Wizard + eksport", node };
}

  const services = state.services.filter(s=>s.assetId===assetId).map(s=>({

    title: s.category || "Service",
    dateISO: s.dateISO || s.createdAtISO,

  }));
  const purchases = state.purchases.filter(p=>p.assetId===assetId).map(p=>({
    type:"Innkjøp",
    sourceId: p.id,
    title: `${p.category || "Innkjøp"} (${p.supplier || "—"})`,

    amountNok: Number(p.amountNok)||0,
    notes: p.notes || "",

  }));
  return [...services, ...purchases].sort((x,y)=> (y.dateISO||"").localeCompare(x.dateISO||""));
}

            ${current.archivedAtISO ? `<a class="btn danger" href="javascript:void(0)" id="hardNo" style="opacity:.5">Arkivert</a>` : `<a class="btn danger" href="javascript:void(0)" id="archNow">Arkiver</a>`}
          </div>
        </div>
      `:""}

      ${creating ? assetSheet({mode:"new"}) : ""}
      ${editId ? assetSheet({mode:"edit", asset: state.assets.find(x=>x.id===editId)}) : ""}
      ${newServiceFor ? serviceSheet(state, newServiceFor) : ""}
      ${svcEditing ? serviceEditSheet(state, svcEditing) : ""}
    </div>
  `);

  setTimeout(()=>{
    $("#q", node)?.addEventListener("input", (e)=>{
      const v = e.target.value;
      const p = new URLSearchParams(params);
      if(v) p.set("q", v); else p.delete("q");
      location.hash = `#/maskiner?${p.toString()}`;
    });

    if(current){
      $("#exAhCsv")?.addEventListener("click", ()=>{
        const s = loadState();
        const rows = buildAssetHistory(s, current.id).map(h=>({
          dato: h.dateISO,
          type: h.type,
          kilde_id: h.sourceId,
          tittel: h.title,
          belop_nok: h.amountNok,
          kvittering_url: h.receiptUrl || "",
          notat: h.notes || ""
        }));
        downloadText(`maskin-historikk-${safeFilename(current.name)}.csv`, toCSV(rows), "text/csv");
      });
      $("#exAhJson")?.addEventListener("click", ()=>{
        const s = loadState();
        downloadText(`maskin-historikk-${safeFilename(current.name)}.json`, JSON.stringify(buildAssetHistory(s, current.id), null, 2), "application/json");
      });

      $("#archNow")?.addEventListener("click", ()=>{
        if(!confirm("Arkivere denne maskinen?")) return;
        const s = loadState();
        const a = s.assets.find(x=>x.id===current.id);
        if(!a) return;
        a.archivedAtISO = nowISO();
        addActivity(s, { type:"MASKIN_ARKIV", title:`Maskin arkivert: ${a.name}`, refs:{ assetId: a.id }});
        saveState(s);
        nav("/maskiner?view=arkiv");
      });

      $("#restoreNow")?.addEventListener("click", ()=>{
        if(!confirm("Gjenopprette denne maskinen?")) return;
        const s = loadState();
        const a = s.assets.find(x=>x.id===current.id);
        if(!a) return;
        a.archivedAtISO = null;
        addActivity(s, { type:"MASKIN_GJENOPPRETT", title:`Maskin gjenopprettet: ${a.name}`, refs:{ assetId: a.id }});
        saveState(s);
        nav("/maskiner?view=aktive");
      });
    }

    const close = ()=> nav(`/maskiner?view=${view}`);
    if(creating || editId){
      $("#bd")?.addEventListener("click", close);
      $("#a_save")?.addEventListener("click", ()=>{
        const s = loadState();
        const name = $("#a_name")?.value?.trim();
        const kind = $("#a_kind")?.value?.trim();
        const brandModel = $("#a_model")?.value?.trim() || "";
        const serial = $("#a_serial")?.value?.trim() || "";
        const notes = $("#a_notes")?.value?.trim() || "";
        if(!name){ alert("Fyll ut navn"); return; }
        if(!kind){ alert("Fyll ut type"); return; }

        if(editId){
          const a = s.assets.find(x=>x.id===editId);
          if(!a) return;
          a.name=name; a.kind=kind; a.brandModel=brandModel; a.serial=serial; a.notes=notes;
          addActivity(s, { type:"MASKIN_ENDRET", title:`Maskin endret: ${name}`, refs:{ assetId: a.id }});
        }else{
          const a = newAsset({name, kind, brandModel, serial, notes});
          s.assets.push(a);
          addActivity(s, { type:"MASKIN_NY", title:`Ny maskin: ${name}`, refs:{ assetId: a.id }});
        }

        saveState(s);
        nav(`/maskiner?view=${view}`);
      });

      $("#a_archive")?.addEventListener("click", ()=>{
        if(!confirm("Arkivere denne maskinen?")) return;
        const s = loadState();
        const a = s.assets.find(x=>x.id===editId);
        if(!a) return;
        a.archivedAtISO = nowISO();
        addActivity(s, { type:"MASKIN_ARKIV", title:`Maskin arkivert: ${a.name}`, refs:{ assetId: a.id }});
        saveState(s);
        nav("/maskiner?view=arkiv");
      });

      $("#a_restore")?.addEventListener("click", ()=>{
        if(!confirm("Gjenopprette denne maskinen?")) return;
        const s = loadState();
        const a = s.assets.find(x=>x.id===editId);
        if(!a) return;
        a.archivedAtISO = null;
        addActivity(s, { type:"MASKIN_GJENOPPRETT", title:`Maskin gjenopprettet: ${a.name}`, refs:{ assetId: a.id }});
        saveState(s);
        nav("/maskiner?view=aktive");
      });
    }

    if(newServiceFor){
      $("#bd")?.addEventListener("click", ()=> nav(`/maskiner?id=${newServiceFor}&view=${view}`));
      const d = new Date(); const pad=(n)=>String(n).padStart(2,"0");
      $("#s_date") && ($("#s_date").value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);

      $("#s_save")?.addEventListener("click", ()=>{
        const s = loadState();
        const dateISO = toISOFromDateInput($("#s_date")?.value) || nowISO();
        const category = $("#s_cat")?.value?.trim() || "";
        const costNok = Number($("#s_cost")?.value || 0);
        const notes = $("#s_notes")?.value?.trim() || "";

        if(!category){ alert("Fyll ut kategori"); return; }

        const a = s.assets.find(x=>x.id===newServiceFor && !x.archivedAtISO);
        if(!a){ alert("Fant ikke maskin (kan være arkivert)"); return; }

        const entry = newService({assetId: a.id, dateISO, category, costNok, notes});
        s.services.push(entry);

        addActivity(s, {
          type:"SERVICE",
          title:`Service: ${a.name} – ${category}`,
          description:`${fmtDate(dateISO)} • ${Math.round(costNok)} NOK`,
          refs:{ assetId: a.id, serviceId: entry.id }
        });

        saveState(s);
        nav(`/maskiner?id=${a.id}&view=${view}`);
      });
    }

    if(serviceEditId && svcEditing){
      $("#bd")?.addEventListener("click", ()=> nav(`/maskiner?id=${svcEditing.assetId}&view=${view}`));

      const d = svcEditing.dateISO ? new Date(svcEditing.dateISO) : new Date();
      const pad=(n)=>String(n).padStart(2,"0");
      $("#s_date").value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      $("#s_cat").value = svcEditing.category || "";
      $("#s_cost").value = Number(svcEditing.costNok||0);
      $("#s_notes").value = svcEditing.notes || "";

      $("#s_save")?.addEventListener("click", ()=>{
        const s = loadState();
        const svc = s.services.find(x=>x.id===serviceEditId);
        if(!svc){ alert("Fant ikke service"); return; }

        svc.dateISO = toISOFromDateInput($("#s_date").value) || svc.dateISO || nowISO();
        svc.category = $("#s_cat").value.trim();
        svc.costNok = Number($("#s_cost").value||0);
        svc.notes = $("#s_notes").value.trim();

        if(!svc.category){ alert("Fyll ut kategori"); return; }

        const a = s.assets.find(x=>x.id===svc.assetId);
        addActivity(s, { type:"SERVICE_ENDRET", title:`Service endret: ${(a?.name||"Maskin")} – ${svc.category}`, refs:{ assetId: svc.assetId, serviceId: svc.id }});
        saveState(s);
        nav(`/maskiner?id=${svc.assetId}&view=${view}`);
      });

      $("#s_del")?.addEventListener("click", ()=>{
        if(!confirmTypeDelete("service-registreringen")) return;
        const s = loadState();
        const idx = s.services.findIndex(x=>x.id===serviceEditId);
        if(idx<0) return;
        const gone = s.services.splice(idx,1)[0];
        addActivity(s, { type:"SERVICE_SLETTET", title:`Service slettet`, refs:{ serviceId: gone.id, assetId: gone.assetId }});
        saveState(s);
        nav(`/maskiner?id=${gone.assetId}&view=${view}`);
      });
    }
  },0);

  return { title:"Maskiner", subtitle:"Historikk per maskin", node };
}

function pageInnkjop(state, params){
  const creating = params.get("new")==="1";
  const presetAsset = params.get("asset") || "";
  const q = (params.get("q")||"").trim().toLowerCase();

  const editId = params.get("edit");
  const editing = editId ? state.purchases.find(p=>p.id===editId) : null;

  const list = state.purchases
    .slice()
    .sort((a,b)=> (b.dateISO||b.createdAtISO||"").localeCompare(a.dateISO||a.createdAtISO||""))
    .filter(p=>{
      const a = p.assetId ? state.assets.find(x=>x.id===p.assetId) : null;
      const hay = `${p.supplier} ${p.category} ${p.amountNok} ${p.notes||""} ${(a?.name||"")}`.toLowerCase();
      return !q ? true : hay.includes(q);
    })
    .slice(0, 200);

  const node = h(`
    <div>
      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="h2">Innkjøp</div>
            <div class="muted">Søk + eksport • redigering</div>
          </div>
          <a class="btn small primary" href="#/innkjop?new=1">+ Ny</a>
        </div>
        <div class="space"></div>

        <div class="grid2">
          <a class="btn" href="javascript:void(0)" id="exCsv">Eksport CSV</a>
          <a class="btn" href="javascript:void(0)" id="exJson">Eksport JSON</a>
        </div>

        <div class="space"></div>
        <input class="input" id="q" placeholder="Søk..." value="${escapeHtml(params.get("q")||"")}" />
      </div>

      <div class="space"></div>

      <div class="card">
        <div class="h2">Siste</div>
        ${list.length ? `
          <div class="list">
            ${list.map(p=>{
              const a = p.assetId ? state.assets.find(x=>x.id===p.assetId) : null;
              return `
                <div class="item">
                  <div class="row" style="justify-content:space-between;">
                    <div>
                      <div><b>${escapeHtml(p.category || "Innkjøp")}</b> – ${escapeHtml(p.supplier || "—")}</div>
                      <div class="muted">${p.dateISO ? fmtDate(p.dateISO) : ""} • ${Math.round(Number(p.amountNok)||0)} NOK ${a ? `• ${escapeHtml(a.name)}`:""}</div>
                    </div>
                    <a class="badge" href="#/innkjop?edit=${p.id}">Rediger</a>
                  </div>
                  ${p.notes ? `<div class="muted" style="margin-top:6px">${escapeHtml(p.notes)}</div>`:""}
                  ${p.receiptUrl ? `<div class="muted small" style="margin-top:6px"><a target="_blank" rel="noopener" href="${escapeHtml(p.receiptUrl)}">Kvittering</a></div>`:""}
                </div>
              `;
            }).join("")}
          </div>
        ` : `<div class="muted">Ingen innkjøp enda.</div>`}
      </div>

      ${creating ? purchaseSheet(state, presetAsset) : ""}
      ${editing ? purchaseEditSheet(state, editing) : ""}
    </div>
  `);

  setTimeout(()=>{
    $("#q", node)?.addEventListener("input", (e)=>{
      const v = e.target.value;
      const p = new URLSearchParams(params);
      if(v) p.set("q", v); else p.delete("q");
      location.hash = `#/innkjop?${p.toString()}`;
    });

    $("#exCsv")?.addEventListener("click", ()=>{
      const s = loadState();
      const rows = s.purchases.slice().sort((a,b)=> (a.dateISO||"").localeCompare(b.dateISO||"")).map(p=>{
        const a = p.assetId ? s.assets.find(x=>x.id===p.assetId) : null;
        return {
          dato: p.dateISO,
          leverandor: p.supplier,
          kategori: p.category,
          belop_nok: p.amountNok,
          maskin: a ? a.name : "",
          kvittering_url: p.receiptUrl || "",
          notat: p.notes || ""
        };
      });
      downloadText("innkjop.csv", toCSV(rows), "text/csv");
    });

    $("#exJson")?.addEventListener("click", ()=>{
      downloadText("innkjop.json", JSON.stringify(loadState().purchases, null, 2), "application/json");
    });

    if(creating){
      $("#bd")?.addEventListener("click", ()=> nav("/innkjop"));
      const d = new Date(); const pad=(n)=>String(n).padStart(2,"0");
      $("#p_date") && ($("#p_date").value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);

      $("#p_save")?.addEventListener("click", ()=>{
        const s = loadState();
        const dateISO = toISOFromDateInput($("#p_date")?.value) || nowISO();
        const supplier = $("#p_supplier")?.value?.trim() || "";
        const category = $("#p_cat")?.value?.trim() || "";
        const amountNok = Number($("#p_amount")?.value || 0);
        const assetId = $("#p_asset")?.value || null;
        const notes = $("#p_notes")?.value?.trim() || "";
        const receiptUrl = ($("#p_receipt")?.value || "").trim();

        if(!supplier){ alert("Fyll ut leverandør"); return; }
        if(!category){ alert("Fyll ut kategori"); return; }
        if(amountNok <= 0){ alert("Beløp må være større enn 0"); return; }

        const entry = newPurchase({dateISO, supplier, category, amountNok, notes, receiptUrl, assetId});
        s.purchases.push(entry);

        addActivity(s, {
          type:"INNKJOP",
          title:`Innkjøp: ${category} – ${supplier}`,
          description:`${fmtDate(dateISO)} • ${Math.round(amountNok)} NOK`,
          refs:{ purchaseId: entry.id, assetId: assetId || null }
        });

        saveState(s);
        nav("/innkjop");
      });
    }

    if(editId && editing){
      $("#bd")?.addEventListener("click", ()=> nav("/innkjop"));

      const d = editing.dateISO ? new Date(editing.dateISO) : new Date();
      const pad=(n)=>String(n).padStart(2,"0");
      $("#p_date").value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      $("#p_supplier").value = editing.supplier || "";
      $("#p_cat").value = editing.category || "";
      $("#p_amount").value = Number(editing.amountNok||0);
      $("#p_notes").value = editing.notes || "";
      $("#p_receipt").value = editing.receiptUrl || "";
      if(editing.assetId) $("#p_asset").value = editing.assetId;

      $("#p_save")?.addEventListener("click", ()=>{
        const s = loadState();
        const p = s.purchases.find(x=>x.id===editId);
        if(!p){ alert("Fant ikke innkjøpet"); return; }

        p.dateISO = toISOFromDateInput($("#p_date").value) || p.dateISO || nowISO();
        p.supplier = $("#p_supplier").value.trim();
        p.category = $("#p_cat").value.trim();
        p.amountNok = Number($("#p_amount").value||0);
        p.assetId = $("#p_asset").value || null;
        p.notes = $("#p_notes").value.trim();
        p.receiptUrl = ($("#p_receipt").value||"").trim();

        if(!p.supplier || !p.category || p.amountNok<=0){ alert("Fyll ut leverandør, kategori og beløp"); return; }

        addActivity(s, { type:"INNKJOP_ENDRET", title:`Innkjøp endret: ${p.category} – ${p.supplier}`, refs:{ purchaseId: p.id, assetId: p.assetId||null }});
        saveState(s);
        nav("/innkjop");
      });

      $("#p_del")?.addEventListener("click", ()=>{
        if(!confirmTypeDelete("innkjøpet")) return;
        const s = loadState();
        const idx = s.purchases.findIndex(x=>x.id===editId);
        if(idx<0) return;
        const gone = s.purchases.splice(idx,1)[0];
        addActivity(s, { type:"INNKJOP_SLETTET", title:`Innkjøp slettet: ${gone.category} – ${gone.supplier}`, refs:{ purchaseId: gone.id }});
        saveState(s);
        nav("/innkjop");
      });
    }
  },0);

  return { title:"Innkjøp", subtitle:"Søk + eksport + rediger", node };
}

    }
    if(addLink){
      $("#bd")?.addEventListener("click", ()=> nav("/innstillinger?tab=lenker"));
      $("#sc_save")?.addEventListener("click", ()=>{
        const title = $("#sc_title")?.value?.trim();
        const url = $("#sc_url")?.value?.trim();
        if(!title || !url){ alert("Fyll ut tittel og URL"); return; }
        if(!/^https?:\/\//i.test(url)){ alert("URL må starte med http:// eller https://"); return; }
        const s = loadState();
        s.settings.shortcuts = s.settings.shortcuts || [];
        s.settings.shortcuts.push({ id: uid(), title, url });
        addActivity(s, { type:"INNSTILLING", title:`Snarvei lagt til: ${title}`, refs:{ url }});
        saveState(s);
        nav("/innstillinger?tab=lenker");
      });
    }
  },0);

  return { title:"Innstillinger", subtitle:"Min gård + Skifter + system", node };
}

/* ----- Backup ----- */
function pageBackup(state){
  const node = h(`
    <div>
      <div class="card">
        <div class="h2">Backup</div>
        <div class="muted">Eksport / import av hele appen (JSON)</div>

        <div class="space"></div>
        <div class="grid2">
          <a class="btn" href="javascript:void(0)" id="ex">Vis eksport</a>
          <a class="btn" href="javascript:void(0)" id="dl">Last ned</a>
        </div>

        <div class="space"></div>
        <textarea class="input" id="txt" placeholder="Eksport vises her. Du kan også lime inn JSON for restore."></textarea>

        <div class="space"></div>
        <a class="btn danger" href="javascript:void(0)" id="imp">Restore (overskriver alt)</a>

        <div class="muted small" style="margin-top:10px">
          Tips: ta backup før store endringer.
        </div>
      </div>
    </div>
  `);

  setTimeout(()=>{
    $("#ex")?.addEventListener("click", ()=>{
      $("#txt").value = exportJSON();
    });
    $("#dl")?.addEventListener("click", ()=>{
      downloadText(`farmapp-backup-${safeFilename(new Date().toISOString().slice(0,10))}.json`, exportJSON(), "application/json");
    });
    $("#imp")?.addEventListener("click", ()=>{
      if(!confirm("Dette overskriver alt lokalt. Fortsette?")) return;
      const txt = $("#txt")?.value || "";
      try{
        importJSON(txt);
        alert("Restore OK");
        nav("/forside");
      }catch(e){
        alert("Ugyldig JSON");
      }
    });
  },0);

  return { title:"Backup", subtitle:"Eksport / import", node };
}

/* =======================
   Render
   ======================= */
function render(){
  try{
    applyBackground();
    const r = route();
    const state = loadState();

    let out = null;

    if(r.path === "/forside") out = pageForside(state);
    else if(r.path === "/oppgaver") out = pageOppgaver(state, r.params);
    else if(r.path === "/jobb") out = pageJobb(state, r.params);
    else if(r.path === "/mer") out = pageMer(state);

    else if(r.path === "/innstillinger") out = pageInnstillinger(state, r.params);
    else if(r.path === "/backup") out = pageBackup(state);

    else if(r.path === "/skifter") out = pageSkifter(state, r.params);
    else if(r.path === "/spray") out = pageSpray(state, r.params);

    else if(r.path === "/maskiner") out = pageMaskiner(state, r.params);
    else if(r.path === "/innkjop") out = pageInnkjop(state, r.params);

    else if(r.path === "/aktivitet") out = pageAktivitet(state, r.params);
    else if(r.path === "/aktivitetlogg") out = pageAktivitetLogg(state, r.params);

    else if(r.path === "/raadgiver") out = pageRaadgiver(state);

    else { nav("/forside"); return; }

    const app = $("#app");
    app.innerHTML = "";
    app.appendChild(renderShell(out, r.path));
  }catch(err){
    showError(err);
  }
}

window.addEventListener("hashchange", render);
render();
</script>
